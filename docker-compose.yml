services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enterprise-apps
    restart: unless-stopped
    ports:
      - "2328:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/db/custom.db
    volumes:
      - db-data:/app/db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  db-data:
    driver: local
